services:
  - type: web
    name: cpa-plataforma-backend
    env: node
    buildCommand: bash scripts/render-build.sh
    startCommand: node scripts/render-start.js
    healthCheckPath: /api/health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false
      - key: AUTH_REQUIRED
        value: "true"
      - key: SESSION_COOKIE_SECURE
        value: "true"
      - key: REDIS_URL
        sync: false
      - key: REDIS_KEY_PREFIX
        value: cpa:backend
      - key: SESSION_CACHE_TTL_SECONDS
        value: "300"

  - type: cron
    name: cpa-plataforma-backup
    env: node
    schedule: "0 7 * * *"
    buildCommand: bash scripts/render-build.sh
    startCommand: node scripts/backup-postgres.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKUP_DELETE_LOCAL_AFTER_UPLOAD
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: BACKUP_RESTORE_TO_TARGET
        value: "false"
      - key: BACKUP_TARGET_DROP_SCHEMAS_FIRST
        value: "false"
      - key: BACKUP_UPLOAD_URL
        sync: false
      - key: BACKUP_UPLOAD_TOKEN
        sync: false
